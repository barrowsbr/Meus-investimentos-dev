<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 215" width="340" height="215">
  <defs>
    <linearGradient id="amex_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="30%" style="stop-color:#D0D0D0"/>
      <stop offset="60%" style="stop-color:#C0C0C0"/>
      <stop offset="100%" style="stop-color:#A8A8A8"/>
    </linearGradient>
    <linearGradient id="chip_g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8A060"/>
      <stop offset="50%" style="stop-color:#D4B878"/>
      <stop offset="100%" style="stop-color:#A89050"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="100%" y2="60%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
  </defs>

  <!-- Card body -->
  <rect width="340" height="215" rx="16" ry="16" fill="url(#amex_bg)" filter="url(#shadow)"/>
  <rect width="340" height="215" rx="16" ry="16" fill="url(#sheen)"/>

  <!-- Top stripe (subtle) -->
  <rect x="0" y="0" width="340" height="38" rx="16" ry="0" fill="rgba(255,255,255,0.12)"/>
  <rect x="0" y="22" width="340" height="16" rx="0" fill="rgba(255,255,255,0.06)"/>

  <!-- AMERICAN EXPRESS wordmark -->
  <text x="28" y="26" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold"
        fill="#555555" letter-spacing="2.5">AMERICAN EXPRESS</text>

  <!-- EMV Chip -->
  <rect x="28" y="68" width="46" height="36" rx="6" ry="6" fill="url(#chip_g)"/>
  <line x1="28" y1="80" x2="74" y2="80" stroke="#987A40" stroke-width="0.8" opacity="0.6"/>
  <line x1="28" y1="93" x2="74" y2="93" stroke="#987A40" stroke-width="0.8" opacity="0.6"/>
  <line x1="46" y1="68" x2="46" y2="104" stroke="#987A40" stroke-width="0.8" opacity="0.6"/>
  <line x1="57" y1="68" x2="57" y2="104" stroke="#987A40" stroke-width="0.8" opacity="0.6"/>

  <!-- Centurion figure (simplified) -->
  <g transform="translate(195, 38)" opacity="0.55">
    <!-- Helmet -->
    <ellipse cx="30" cy="18" rx="14" ry="16" fill="#888"/>
    <rect x="20" y="26" width="20" height="4" rx="2" fill="#777"/>
    <!-- Plume -->
    <path d="M 24 8 Q 30 0 36 8" stroke="#999" stroke-width="2.5" fill="none"/>
    <!-- Body/Armor -->
    <rect x="18" y="34" width="24" height="30" rx="4" fill="#888"/>
    <!-- Shield -->
    <path d="M 8 38 L 8 60 L 18 68 L 28 60 L 28 38 Z" fill="#999" opacity="0.7"/>
    <!-- Spear -->
    <line x1="50" y1="5" x2="50" y2="75" stroke="#888" stroke-width="2"/>
    <polygon points="50,0 46,14 54,14" fill="#999"/>
  </g>

  <!-- Contactless symbol -->
  <g transform="translate(275, 60)" fill="none" stroke="#777" stroke-width="2.2">
    <path d="M 0 12 Q 5 8 10 12" opacity="0.5"/>
    <path d="M -3 16 Q 5 8 13 16" opacity="0.65"/>
    <path d="M -6 20 Q 5 8 16 20" opacity="0.8"/>
    <circle cx="5" cy="12" r="1.5" fill="#777" stroke="none"/>
  </g>

  <!-- Last 4 digits -->
  <text x="294" y="80" font-family="'Courier New', monospace" font-size="11"
        fill="#555" text-anchor="middle" letter-spacing="1">7997</text>

  <!-- PLATINUM label -->
  <text x="28" y="148" font-family="Arial, sans-serif" font-size="9" font-weight="bold"
        fill="#888888" letter-spacing="4" text-transform="uppercase">PLATINUM</text>

  <!-- Cardholder -->
  <text x="28" y="172" font-family="'Courier New', monospace" font-size="12"
        fill="#444444" letter-spacing="1.5">C F FROST</text>

  <!-- Member Since -->
  <text x="28" y="188" font-family="Arial, sans-serif" font-size="8"
        fill="#888888" letter-spacing="0.5">MEMBER SINCE  09</text>

  <!-- AMEX wordmark bottom right -->
  <text x="312" y="196" font-family="Arial, sans-serif" font-size="8" font-weight="bold"
        fill="#666666" text-anchor="middle" letter-spacing="1">AMEX</text>
</svg>
