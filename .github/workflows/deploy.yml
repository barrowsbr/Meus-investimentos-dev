name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'dash/Dash/**'
      - 'Dockerfile'
      - 'docker-entrypoint.sh'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image
        run: |
          gcloud builds submit \
            --tag gcr.io/project-34f443f1-80d4-441b-879/meus-investimentos \
            --project project-34f443f1-80d4-441b-879

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy meus-investimentos \
            --image gcr.io/project-34f443f1-80d4-441b-879/meus-investimentos \
            --region southamerica-east1 \
            --project project-34f443f1-80d4-441b-879 \
            --set-secrets "GCP_SERVICE_ACCOUNT_JSON=gcp-sa-json:2,GEMINI_API_KEY=gemini-key:latest" \
            --set-env-vars "SPREADSHEET_NAME=gdados"
