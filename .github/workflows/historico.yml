name: Histórico patrimonial (3x/dia)

# Grava um ponto do patrimônio na aba `historico_patrimonio` (página Patrimônio).
# 3x por dia em dias úteis. NÃO usa cron da Vercel (plano Hobby só permite 1x/dia).
# O liga/desliga fica em Configurações → Histórico patrimonial.
#
# Secrets/vars necessários no repositório (Settings → Secrets and variables → Actions):
#   - secret CRON_SECRET : mesmo valor da env var CRON_SECRET na Vercel
#   - var    APP_URL     : (opcional) URL de produção; default abaixo se ausente

on:
  schedule:
    # Horários em UTC → 10h, 14h e 18h de Brasília (BRT = UTC-3), seg–sex.
    - cron: '0 13,17,21 * * 1-5'
  workflow_dispatch: {}

jobs:
  registrar:
    runs-on: ubuntu-latest
    steps:
      - name: Registrar patrimônio no histórico
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ vars.APP_URL || 'https://meus-investimentos-dev.vercel.app' }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::Secret CRON_SECRET não configurado no GitHub. Vá em Settings → Secrets and variables → Actions → New repository secret, nome CRON_SECRET, com o MESMO valor da env var CRON_SECRET na Vercel."
            exit 1
          fi
          echo "Chamando $APP_URL/api/cron/historico"
          HTTP=$(curl -sS --max-time 90 \
            -H "Authorization: Bearer $CRON_SECRET" \
            -o resposta.json -w '%{http_code}' \
            "$APP_URL/api/cron/historico") || { echo "::error::curl falhou (rede/timeout)"; exit 1; }
          cat resposta.json; echo ""
          if [ "$HTTP" != "200" ]; then
            [ "$HTTP" = "401" ] && echo "::error::HTTP 401 — o CRON_SECRET do GitHub não bate com o da Vercel. Atualize o secret com o valor atual da Vercel." || echo "::error::HTTP $HTTP na chamada do histórico."
            exit 1
          fi
