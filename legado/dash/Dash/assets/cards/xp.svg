<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 215" width="340" height="215">
  <defs>
    <linearGradient id="xp_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A"/>
      <stop offset="60%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="chip_g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8A96E"/>
      <stop offset="50%" style="stop-color:#E8D09A"/>
      <stop offset="100%" style="stop-color:#B8954E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5A623"/>
      <stop offset="100%" style="stop-color:#E8890A"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>

  <!-- Card body -->
  <rect width="340" height="215" rx="16" ry="16" fill="url(#xp_bg)" filter="url(#shadow)"/>
  <rect width="340" height="215" rx="16" ry="16" fill="url(#sheen)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="340" height="4" rx="2" fill="url(#accent)"/>

  <!-- EMV Chip -->
  <rect x="30" y="68" width="46" height="36" rx="6" ry="6" fill="url(#chip_g)"/>
  <line x1="30" y1="81" x2="76" y2="81" stroke="#C8A050" stroke-width="1" opacity="0.5"/>
  <line x1="30" y1="94" x2="76" y2="94" stroke="#C8A050" stroke-width="1" opacity="0.5"/>
  <line x1="48" y1="68" x2="48" y2="104" stroke="#C8A050" stroke-width="1" opacity="0.5"/>
  <line x1="59" y1="68" x2="59" y2="104" stroke="#C8A050" stroke-width="1" opacity="0.5"/>

  <!-- XP logo -->
  <text x="285" y="42" font-family="Arial Black, sans-serif" font-size="28" font-weight="900"
        fill="url(#accent)" text-anchor="middle" letter-spacing="-1">XP</text>

  <!-- XP Investimentos label -->
  <text x="285" y="56" font-family="Arial, sans-serif" font-size="7.5"
        fill="#F5A623" text-anchor="middle" opacity="0.6" letter-spacing="0.5">INVESTIMENTOS</text>

  <!-- Cardholder name -->
  <text x="30" y="168" font-family="'Courier New', monospace" font-size="12"
        fill="#ffffff" opacity="0.8" letter-spacing="1.5">LUCAS</text>

  <!-- Visa / Mastercard indicator -->
  <text x="30" y="188" font-family="Arial, sans-serif" font-size="8"
        fill="#F5A623" opacity="0.55" letter-spacing="0.5">XP VISA INFINITE</text>

  <!-- Last 4 -->
  <text x="310" y="188" font-family="'Courier New', monospace" font-size="9"
        fill="#ffffff" opacity="0.3" text-anchor="end">•••• 0000</text>
</svg>
