<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 215" width="340" height="215">
  <defs>
    <linearGradient id="nu_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B0FC5"/>
      <stop offset="50%" style="stop-color:#8A05BE"/>
      <stop offset="100%" style="stop-color:#5A0A9E"/>
    </linearGradient>
    <linearGradient id="chip_g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8A96E"/>
      <stop offset="50%" style="stop-color:#E8D09A"/>
      <stop offset="100%" style="stop-color:#B8954E"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <!-- Card body -->
  <rect width="340" height="215" rx="16" ry="16" fill="url(#nu_bg)" filter="url(#shadow)"/>

  <!-- Subtle sheen overlay -->
  <rect width="340" height="215" rx="16" ry="16" fill="url(#sheen)" opacity="0.08"/>
  <defs>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- EMV Chip -->
  <rect x="30" y="70" width="46" height="36" rx="6" ry="6" fill="url(#chip_g)"/>
  <line x1="30" y1="83" x2="76" y2="83" stroke="#C8A050" stroke-width="1" opacity="0.5"/>
  <line x1="30" y1="96" x2="76" y2="96" stroke="#C8A050" stroke-width="1" opacity="0.5"/>
  <line x1="48" y1="70" x2="48" y2="106" stroke="#C8A050" stroke-width="1" opacity="0.5"/>
  <line x1="59" y1="70" x2="59" y2="106" stroke="#C8A050" stroke-width="1" opacity="0.5"/>

  <!-- Nubank 'n' logo — bottom right -->
  <text x="298" y="180" font-family="Georgia, serif" font-size="42" font-weight="bold"
        fill="#ffffff" opacity="0.9" text-anchor="middle">n</text>

  <!-- Cardholder name -->
  <text x="30" y="175" font-family="'Courier New', monospace" font-size="11"
        fill="#ffffff" opacity="0.75" letter-spacing="2">LUCAS</text>

  <!-- Nubank wordmark -->
  <text x="30" y="195" font-family="Arial, sans-serif" font-size="9"
        fill="#ffffff" opacity="0.45" letter-spacing="1">NUBANK</text>
</svg>
