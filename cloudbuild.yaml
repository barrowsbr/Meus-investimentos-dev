steps:
  # ── 1. Build da imagem Docker (backend FastAPI) ────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '--file=backend/Dockerfile'
      - '--tag=southamerica-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/meus-investimentos-dev/meus-investimentos-dev:$COMMIT_SHA'
      - '--tag=southamerica-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/meus-investimentos-dev/meus-investimentos-dev:latest'
      - '--cache-from=southamerica-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/meus-investimentos-dev/meus-investimentos-dev:latest'
      - '.'

  # ── 2. Push para o Artifact Registry ──────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/meus-investimentos-dev/meus-investimentos-dev'

  # ── 3. Deploy no Cloud Run ─────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'meus-investimentos-dev'
      - '--image=southamerica-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/meus-investimentos-dev/meus-investimentos-dev:$COMMIT_SHA'
      - '--region=southamerica-east1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--max-instances=5'
      - '--timeout=300'
      - '--set-env-vars=SPREADSHEET_NAME=gdados'
      - '--set-secrets=GCP_SERVICE_ACCOUNT_JSON=gcp-sa-json:latest,GEMINI_API_KEY=gemini-key:latest'

# Armazena a imagem no Artifact Registry
images:
  - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/meus-investimentos-dev/meus-investimentos-dev:$COMMIT_SHA'
  - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/meus-investimentos-dev/meus-investimentos-dev:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
