<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Modo jogo · Meus Investimentos</title>
<!-- Modo APP (standalone): quando o site é aberto pela versão instalada na Tela
     de Início, o iOS dá MAIS orçamento de memória e tira a barra do Safari (que
     descarrega a aba). Estas metas mantêm o modo jogo imersivo também aqui na
     página crua. -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fliperama">
<meta name="theme-color" content="#0b090d">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<!-- Página CRUA de propósito: no iPhone, o emulador (wasm + ROM) dentro da
     página completa do app estourava a memória do Safari e a aba recarregava.
     Aqui só existe o EmulatorJS — o app é liberado da memória ao navegar. -->
<style>
  /* touch-action:manipulation mata o DOUBLE-TAP-ZOOM do Safari (o bug: toques
     rápidos nos botões davam zoom e travavam a tela). */
  html,body{margin:0;height:100%;background:#0b090d;overflow:hidden;touch-action:manipulation;
    font-family:-apple-system,system-ui,sans-serif;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  #game{width:100%;height:100%;touch-action:none}
  /* 1x + pixelated: emulador roda em devicePixelRatio 1 (ver JS) para não
     estourar a memória do Safari; o pixelated mantém o pixel-art nítido. */
  #game canvas{touch-action:none !important;
    image-rendering:pixelated; image-rendering:crisp-edges}
  #voltar{position:fixed;top:calc(env(safe-area-inset-top,0px) + 8px);left:8px;z-index:30;
    color:#fcd9a0;text-decoration:none;font:600 12px system-ui;background:rgba(0,0,0,.55);
    padding:6px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.15)}
  #erro{color:#fca5a5;font:14px system-ui;padding:80px 24px;text-align:center}

  /* Some com o gamepad virtual embutido do EmulatorJS — usamos o nosso. */
  .ejs_virtualGamepad_parent{display:none !important}

  /* Celular EM PÉ: desce o jogo para baixo da ilha/relógio do iPhone. */
  @media (orientation: portrait) and (pointer: coarse){
    #game canvas{ margin-top: calc(env(safe-area-inset-top,0px) + 44px) !important; }
  }

  /* ── Controles próprios (só em telas de toque) ──────────────────────────── */
  #ctrl{ display:none }
  @media (pointer: coarse){ #ctrl{ display:block } }
  #ctrl{ position:fixed; inset:0; z-index:20; pointer-events:none; touch-action:none }
  #ctrl [hidden]{ display:none !important } /* .cap/.btn forçam display; respeita o hidden */
  #ctrl .btn,#ctrl .pad{ pointer-events:auto; touch-action:none; position:absolute;
    -webkit-tap-highlight-color:transparent }

  /* botões redondos (A/B/X/Y/C) */
  #ctrl .btn{ display:flex; align-items:center; justify-content:center;
    border-radius:50%; font-weight:800; color:#fdf0d8;
    background:radial-gradient(circle at 38% 32%, rgba(60,48,70,.72), rgba(18,14,22,.66));
    border:1.5px solid rgba(240,184,96,.55);
    box-shadow:0 4px 14px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.14), 0 0 14px rgba(240,184,96,.12);
    backdrop-filter:blur(2px) }
  #ctrl .btn.on{ background:radial-gradient(circle at 38% 32%, rgba(251,191,36,.95), rgba(217,119,6,.9));
    color:#1a1206; border-color:#fde68a; box-shadow:0 0 18px rgba(251,191,36,.6) }

  /* botões-cápsula (Start/Select/L/R) */
  #ctrl .cap{ display:flex; align-items:center; justify-content:center; pointer-events:auto;
    touch-action:none; position:absolute; border-radius:999px; font-weight:700; letter-spacing:.08em;
    color:#e8dcc4; background:rgba(24,18,28,.6); border:1.5px solid rgba(255,255,255,.16);
    box-shadow:0 3px 10px rgba(0,0,0,.5); backdrop-filter:blur(2px) }
  #ctrl .cap.on{ background:rgba(251,191,36,.9); color:#1a1206; border-color:#fde68a }

  /* D-pad */
  #ctrl .pad{ border-radius:22%;
    background:radial-gradient(circle at 50% 42%, rgba(52,42,62,.6), rgba(14,11,18,.6));
    border:1.5px solid rgba(240,184,96,.4);
    box-shadow:0 5px 16px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.1); backdrop-filter:blur(2px) }
  #ctrl .pad::before,#ctrl .pad::after{ content:""; position:absolute; background:rgba(255,255,255,.08); border-radius:6px }
  #ctrl .pad::before{ left:33%; right:33%; top:8%; bottom:8% }
  #ctrl .pad::after{ top:33%; bottom:33%; left:8%; right:8% }
  #ctrl .pad i{ position:absolute; color:#fcd9a0; font-style:normal; font-size:min(6vw,26px); opacity:.7;
    transition:color .06s,opacity .06s }
  #ctrl .pad i.u{ top:3%; left:50%; transform:translateX(-50%) }
  #ctrl .pad i.d{ bottom:3%; left:50%; transform:translateX(-50%) }
  #ctrl .pad i.l{ left:5%; top:50%; transform:translateY(-50%) }
  #ctrl .pad i.r{ right:5%; top:50%; transform:translateY(-50%) }
  #ctrl .pad i.act{ color:#fbbf24; opacity:1; text-shadow:0 0 10px #fbbf24 }

  /* ─ Tamanhos e posições — RETRATO (padrão) ─ */
  #ctrl .pad{ width:clamp(148px,42vw,208px); aspect-ratio:1; left:max(16px,4.5vw); bottom:13vh }
  #ctrl #faces{ position:absolute; pointer-events:none;
    width:clamp(158px,44vw,214px); aspect-ratio:1; right:max(10px,3vw); bottom:12.5vh }
  #ctrl .btn{ width:clamp(60px,16vw,80px); height:clamp(60px,16vw,80px); font-size:clamp(18px,4.6vw,24px) }
  #ctrl .cap{ height:clamp(30px,7.6vw,40px); padding:0 clamp(16px,4.6vw,26px); font-size:clamp(11px,3vw,14px) }
  #ctrl #sys{ position:absolute; left:50%; bottom:5vh; transform:translateX(-50%);
    display:flex; gap:clamp(14px,5vw,30px) }
  #ctrl #sys .cap{ position:relative; top:auto; left:auto; right:auto; bottom:auto } /* fluem no flex */
  /* Topo-centro: Fast (acelerar) + interruptor discreto de visibilidade.
     Fica na faixa preta acima do jogo (retrato) — longe do "voltar" (esq.),
     do menu ☰ (dir.) e dos polegares durante a partida. */
  #ctrl #topc{ position:absolute; top:calc(env(safe-area-inset-top,0px) + 8px); left:50%;
    transform:translateX(-50%); display:flex; align-items:center; gap:8px; pointer-events:none }
  #ctrl #topc > *{ pointer-events:auto }
  #ctrl #Fc{ position:relative; top:auto; left:auto; transform:none;
    height:clamp(28px,7vw,36px); padding:0 clamp(12px,3.4vw,18px); font-size:clamp(10px,2.8vw,13px) }
  /* interruptor BEM discreto — mostra/oculta Fast, Start e Select */
  #ctrl #visTgl{ width:clamp(20px,5.4vw,26px); height:clamp(20px,5.4vw,26px); border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:clamp(10px,2.8vw,13px);
    color:#e8dcc4; background:rgba(24,18,28,.5); border:1px solid rgba(255,255,255,.12);
    opacity:.28; -webkit-tap-highlight-color:transparent; touch-action:none; transition:opacity .15s }
  #ctrl #visTgl:active{ opacity:.7 }
  /* indicador de controle físico conectado (Gamepad API) */
  #ctrl #gpInd{ display:flex; align-items:center; justify-content:center;
    width:clamp(20px,5.4vw,26px); height:clamp(20px,5.4vw,26px); font-size:clamp(11px,3vw,14px);
    opacity:.7; filter:drop-shadow(0 0 6px rgba(96,165,250,.8)) }
  #ctrl .lr{ height:clamp(34px,8vw,46px); width:clamp(64px,18vw,92px) }
  #ctrl #Lc{ left:max(16px,4.5vw); bottom:calc(13vh + clamp(148px,42vw,208px) + 14px) }
  #ctrl #Rc{ right:max(16px,4.5vw); bottom:calc(12.5vh + clamp(158px,44vw,214px) + 14px) }

  /* ─ PAISAGEM: controles nas laterais, jogo grande ao centro ─ */
  @media (orientation: landscape) and (pointer: coarse){
    #ctrl .pad{ width:clamp(130px,30vh,180px); left:max(12px,2.5vw); bottom:9vh }
    #ctrl #faces{ width:clamp(140px,32vh,190px); right:max(10px,2vw); bottom:8vh }
    #ctrl .btn{ width:clamp(56px,13vh,74px); height:clamp(56px,13vh,74px); font-size:clamp(17px,3.6vh,23px) }
    #ctrl #sys{ bottom:6vh; gap:clamp(16px,4vw,36px) }
    #ctrl .cap{ height:clamp(30px,6.4vh,40px); padding:0 clamp(16px,3.4vh,26px) }
    #ctrl .lr{ width:clamp(66px,15vh,96px); height:clamp(34px,7vh,46px) }
    /* abaixo do "voltar" (esq.) e do menu ☰ (dir.) para não sobrepor */
    #ctrl #Lc{ left:max(12px,2.5vw); top:calc(env(safe-area-inset-top,0px) + 54px); bottom:auto }
    #ctrl #Rc{ right:max(12px,2.5vw); top:calc(env(safe-area-inset-top,0px) + 54px); bottom:auto }
  }
</style>
</head>
<body>
<script>
// Trava QUALQUER zoom da página (double-tap e pinça) — é um jogo, não deve dar
// zoom. touch-action:manipulation cobre o double-tap; estes cobrem a pinça e o
// double-tap residual do Safari iOS, que travava a tela sem voltar.
["gesturestart","gesturechange","gestureend"].forEach(function(ev){
  document.addEventListener(ev, function(e){ e.preventDefault(); }, { passive:false });
});
var _ultToque = 0;
document.addEventListener("touchend", function(e){
  var agora = Date.now();
  if(agora - _ultToque <= 350) e.preventDefault(); // 2º toque rápido = zoom → bloqueia
  _ultToque = agora;
}, { passive:false });

// Tela sempre acesa durante o jogo (Screen Wake Lock — iOS 16.4+). O iOS solta
// o lock ao ir pro background, então reobtemos ao voltar; e liberamos ao sair.
(function(){
  var lock = null;
  async function pega(){
    try{
      if("wakeLock" in navigator && document.visibilityState === "visible"){
        lock = await navigator.wakeLock.request("screen");
      }
    }catch(_){ /* negado/sem suporte — segue sem */ }
  }
  document.addEventListener("visibilitychange", function(){
    if(document.visibilityState === "visible") pega();
  });
  window.addEventListener("pagehide", function(){ try{ if(lock) lock.release(); }catch(_){}; lock = null; });
  pega();
})();
</script>
<a id="voltar" href="/gameboy">&#8249; voltar</a>
<div id="game"></div>

<!-- Controles próprios (grandes, translúcidos) — dirigem o core pela API do
     EmulatorJS (gameManager.simulateInput). Layouts distintos por orientação. -->
<div id="ctrl" hidden>
  <div class="pad" id="dpad"><i class="u">▲</i><i class="d">▼</i><i class="l">◀</i><i class="r">▶</i></div>
  <div id="faces"></div>
  <div id="sys"></div>
  <div class="cap lr btn-cap" id="Lc" hidden>L</div>
  <div class="cap lr btn-cap" id="Rc" hidden>R</div>
  <div id="topc">
    <div class="cap" id="Fc" hidden>FAST ⏩</div>
    <div id="visTgl" role="button" aria-label="Mostrar ou ocultar Fast, Start e Select">◉</div>
    <div id="gpInd" title="Controle conectado" hidden>🎮</div>
  </div>
</div>

<script>
// ── Fiação dos controles → core (RetroPad ids) ─────────────────────────────
(function(){
  var B=0,Y=1,SELECT=2,START=3,UP=4,DOWN=5,LEFT=6,RIGHT=7,A=8,X=9,L=10,R=11;
  // Conjunto de botões por core (face em diamante; posição em % da caixa).
  var SETS = {
    gambatte:{ face:[{l:"B",i:B,x:26,y:62},{l:"A",i:A,x:74,y:40}], lr:false, sys:[["SELECT",SELECT],["START",START]] },
    mgba:{ face:[{l:"B",i:B,x:26,y:62},{l:"A",i:A,x:74,y:40}], lr:true, sys:[["SELECT",SELECT],["START",START]] },
    snes9x:{ face:[{l:"Y",i:Y,x:12,y:50},{l:"X",i:X,x:50,y:12},{l:"B",i:B,x:50,y:88},{l:"A",i:A,x:88,y:50}], lr:true, sys:[["SELECT",SELECT],["START",START]] },
    genesis_plus_gx:{ face:[{l:"B",i:B,x:16,y:58},{l:"C",i:Y,x:50,y:44},{l:"A",i:A,x:84,y:58}], lr:false, sys:[["START",START]] }
  };
  var core = new URLSearchParams(location.search).get("core") || "gambatte";
  var set = SETS[core] || SETS.gambatte;

  function press(index, on){
    var e = window.EJS_emulator;
    if(e && e.gameManager && e.gameManager.simulateInput){
      try{ e.gameManager.simulateInput(0, index, on ? 1 : 0); }catch(_){}
    }
  }

  // botões de face
  var faces = document.getElementById("faces");
  set.face.forEach(function(f){
    var b = document.createElement("div");
    b.className = "btn"; b.textContent = f.l;
    b.style.left = f.x + "%"; b.style.top = f.y + "%";
    b.style.transform = "translate(-50%,-50%)";
    liga(b, f.i);
    faces.appendChild(b);
  });
  // Start/Select
  var sys = document.getElementById("sys");
  set.sys.forEach(function(s){
    var b = document.createElement("div");
    b.className = "cap"; b.textContent = s[0];
    liga(b, s[1]);
    sys.appendChild(b);
  });
  // L/R
  if(set.lr){
    ["Lc","Rc"].forEach(function(id,k){
      var b = document.getElementById(id); b.hidden = false;
      liga(b, k===0 ? L : R);
    });
  }
  // FAST (acelerar) — TOGGLE (não é press/solta): liga/desliga o fast-forward do
  // core (gameManager.toggleFastForward(1|0), da API do EmulatorJS que o nosso
  // layout escondeu junto com o gamepad embutido).
  (function(){
    var f = document.getElementById("Fc"); if(!f) return;
    f.hidden = false;
    var lig = false;
    function ff(v){
      var e = window.EJS_emulator;
      if(e && e.gameManager && e.gameManager.toggleFastForward){
        try{ e.gameManager.toggleFastForward(v ? 1 : 0); }catch(_){}
      }
    }
    f.addEventListener("pointerdown", function(e){
      e.preventDefault(); lig = !lig; f.classList.toggle("on", lig); ff(lig);
    });
  })();
  // Interruptor DISCRETO de visibilidade — mostra/oculta Fast, Start e Select
  // (alguns jogos não usam esses botões e o dono prefere a tela mais limpa).
  // A escolha fica salva no aparelho. O próprio interruptor nunca some.
  (function(){
    var t = document.getElementById("visTgl"); if(!t) return;
    var KEY = "mi_ctrl_extras";
    var vis = true;
    try{ vis = localStorage.getItem(KEY) !== "0"; }catch(_){}
    function aplica(){
      ["Fc","sys"].forEach(function(id){
        var el = document.getElementById(id);
        if(el) el.style.display = vis ? "" : "none";
      });
      t.textContent = vis ? "◉" : "◎";
    }
    aplica();
    t.addEventListener("pointerdown", function(e){
      e.preventDefault(); vis = !vis;
      try{ localStorage.setItem(KEY, vis ? "1" : "0"); }catch(_){}
      aplica();
    });
  })();

  // botão simples (press/release), multi-toque
  function liga(el, index){
    var ativo = false;
    function on(e){ e.preventDefault(); if(ativo) return; ativo = true; el.classList.add("on"); press(index, true); }
    function off(){ if(!ativo) return; ativo = false; el.classList.remove("on"); press(index, false); }
    el.addEventListener("pointerdown", on);
    el.addEventListener("pointerup", off);
    el.addEventListener("pointercancel", off);
    el.addEventListener("pointerleave", off);
  }

  // D-pad analógico (com diagonais)
  (function(){
    var pad = document.getElementById("dpad");
    var setas = { u:pad.querySelector(".u"), d:pad.querySelector(".d"), l:pad.querySelector(".l"), r:pad.querySelector(".r") };
    var estado = { u:false, d:false, l:false, r:false };
    function aplica(nx, ny){
      var dz = 0.30;
      var novo = { l: nx < -dz, r: nx > dz, u: ny < -dz, d: ny > dz };
      [["u",UP],["d",DOWN],["l",LEFT],["r",RIGHT]].forEach(function(p){
        var k = p[0];
        if(novo[k] !== estado[k]){ estado[k] = novo[k]; press(p[1], novo[k]); setas[k].classList.toggle("act", novo[k]); }
      });
    }
    function solta(){ aplica(0,0); }
    function mede(e){
      var r = pad.getBoundingClientRect();
      var nx = (e.clientX - (r.left + r.width/2)) / (r.width/2);
      var ny = (e.clientY - (r.top + r.height/2)) / (r.height/2);
      aplica(Math.max(-1.5,Math.min(1.5,nx)), Math.max(-1.5,Math.min(1.5,ny)));
    }
    pad.addEventListener("pointerdown", function(e){ e.preventDefault(); pad.setPointerCapture(e.pointerId); mede(e); });
    pad.addEventListener("pointermove", function(e){ if(e.pressure>0 || e.buttons) mede(e); });
    pad.addEventListener("pointerup", solta);
    pad.addEventListener("pointercancel", solta);
  })();

  // ── Controle físico Bluetooth/USB (Gamepad API) ──────────────────────────
  // Pareie o controle nos Ajustes do iPhone; os botões físicos dirigem o MESMO
  // core que os botões da tela (mapa padrão → ids do RetroPad). Convive com o
  // toque. Um ícone 🎮 discreto acende quando um controle está conectado.
  (function(){
    var ind = document.getElementById("gpInd");
    var MAP = { 0:B, 1:A, 2:Y, 3:X, 4:L, 5:R, 6:L, 7:R, 8:SELECT, 9:START, 12:UP, 13:DOWN, 14:LEFT, 15:RIGHT };
    var prev = {}, rodando = false;
    function pads(){ return navigator.getGamepads ? navigator.getGamepads() : []; }
    function algum(){ var p = pads(); for(var i=0;i<p.length;i++) if(p[i]) return p[i]; return null; }
    function tick(){
      var gp = algum();
      if(gp){
        for(var b in MAP){
          var on = !!(gp.buttons[b] && gp.buttons[b].pressed);
          if(on !== prev["b"+b]){ prev["b"+b] = on; press(MAP[b], on); }
        }
        var ax = gp.axes[0]||0, ay = gp.axes[1]||0, dz = 0.4;
        [["axl",LEFT,ax<-dz],["axr",RIGHT,ax>dz],["axu",UP,ay<-dz],["axd",DOWN,ay>dz]].forEach(function(p){
          if(p[2] !== prev[p[0]]){ prev[p[0]] = p[2]; press(p[1], p[2]); }
        });
        if(ind && ind.hidden) ind.hidden = false;
        requestAnimationFrame(tick);
      } else {
        for(var k in prev){ if(prev[k]){ prev[k] = false; } } // solta pendências
        rodando = false; if(ind) ind.hidden = true;
      }
    }
    function liga(){ if(rodando) return; rodando = true; requestAnimationFrame(tick); }
    window.addEventListener("gamepadconnected", liga);
    if(algum()) liga(); // já pareado antes de abrir
  })();

  // Revela os controles quando o jogo começar (emulador pronto).
  function revela(){ var c = document.getElementById("ctrl"); if(c) c.hidden = false; }
  var ant = window.EJS_onGameStart;
  window.EJS_onGameStart = function(){ if(typeof ant === "function") try{ ant(); }catch(_){}; revela(); };
  // fallback: mostra assim que o gameManager existir
  var t = setInterval(function(){
    if(window.EJS_emulator && window.EJS_emulator.gameManager){ revela(); clearInterval(t); }
  }, 500);
  setTimeout(function(){ clearInterval(t); }, 30000);
})();
</script>

<script>
(async function(){
  const q = new URLSearchParams(location.search);
  const jogo = q.get("jogo") || "arquivo";

  function idb(chave){
    return new Promise(function(res){
      try{
        const req = indexedDB.open("mi_gameboy", 1);
        req.onupgradeneeded = function(){ req.result.createObjectStore("roms"); };
        req.onsuccess = function(){
          try{
            const g = req.result.transaction("roms").objectStore("roms").get(chave);
            g.onsuccess = function(){ res(g.result || null); };
            g.onerror = function(){ res(null); };
          }catch(e){ res(null); }
        };
        req.onerror = function(){ res(null); };
      }catch(e){ res(null); }
    });
  }
  function coreDe(nome){
    if(/\.gba$/i.test(nome)) return "mgba";
    if(/\.(sfc|smc)$/i.test(nome)) return "snes9x";
    if(/\.(md|gen|smd|bin)$/i.test(nome)) return "genesis_plus_gx";
    return "gambatte";
  }

  let nome = "", url = "", core = "gambatte";
  // Jogo do CATÁLOGO do Drive: ?drive=<fileId>&nome=...&core=... — baixa pelo
  // proxy same-origin /api/gameboy/rom (esconde a chave e valida no catálogo).
  const driveId = q.get("drive");
  const romParam = q.get("rom");
  if(driveId && /^[a-zA-Z0-9_-]{10,}$/.test(driveId)){
    nome = q.get("nome") || "ROM";
    core = q.get("core") || coreDe(nome);
    url = "/api/gameboy/rom?id=" + encodeURIComponent(driveId);
  } else if(romParam && romParam.indexOf("/roms/") === 0 && romParam.indexOf("..") < 0){
    nome = q.get("nome") || romParam.split("/").pop();
    url = romParam;
    core = coreDe(romParam);
  } else if(jogo === "ucity"){
    nome = "µCity"; url = "/roms/homebrew/ucity.gbc";
  } else if(jogo === "pokemon"){
    nome = "Pokémon Gold Spaceworld ’97";
    try{
      const r = await fetch("/roms/pokegold-spaceworld-en.gb");
      if(r.ok && (r.headers.get("content-type")||"").indexOf("octet") >= 0){
        const b = await r.arrayBuffer();
        if(b.byteLength > 0x8000) url = URL.createObjectURL(new Blob([b]));
      }
    }catch(e){ /* sem ROM no repo — tenta o aparelho */ }
    if(!url){
      const salvo = await idb("rom");
      if(salvo && salvo.dados && salvo.dados.length) url = URL.createObjectURL(new Blob([new Uint8Array(salvo.dados)]));
    }
  } else { // "arquivo" — o último aberto no card do EmulatorJS
    const salvo = await idb("rom_ejs");
    if(salvo && salvo.dados && salvo.dados.length){
      nome = salvo.nome || "ROM";
      core = coreDe(nome);
      url = URL.createObjectURL(new Blob([new Uint8Array(salvo.dados)]));
    }
  }

  if(!url){
    document.getElementById("game").innerHTML =
      '<p id="erro">ROM não encontrada neste aparelho — volte e abra o arquivo de novo.</p>';
    return;
  }

  // ── Regime de memória para o Safari do iPhone ────────────────────────────
  // A aba recarregava sozinha (OOM) mesmo com ROM pequena → consumo cresce
  // por quadro. Quatro freios:
  // 1) canvas em 1x POR PADRÃO — a tela Retina do iPhone (3x) multiplica por 9
  //    a memória de vídeo de CADA frame. Esse é o custo dominante: NÃO depende
  //    do tamanho da ROM, por isso um jogo LEVE (Pac-Man) quebrava igual a um
  //    pesado. Travar o devicePixelRatio em 1x corta isso na raiz; o pixel-art
  //    fica nítido com image-rendering:pixelated no canvas. ?retina=1 restaura
  //    a nitidez cheia (para o desktop, onde memória não é gargalo).
  // 2) shader desligado (framebuffers extras);
  // 3) sem threads e sem cache de ROM do EJS no IndexedDB (escrita de MB em
  //    segundo plano enquanto o jogo roda);
  // 4) rewind desligado (buffer cresce por quadro).
  if(q.get("retina") !== "1"){
    try{ Object.defineProperty(window, "devicePixelRatio", { get: function(){ return 1; }, configurable: true }); }catch(e){}
  }
  // threads OFF de propósito: além de exigir isolamento cross-origin (que o iOS
  // trata mal), o EmulatorJS já usa o core WASM com SIMD single-thread — que
  // aproveita as unidades vetoriais da CPU do iPhone e é o mais EFICIENTE aqui,
  // sem o custo de memória de vários workers. Threads no iOS só pioram.
  window.EJS_threads = false;
  window.EJS_CacheLimit = 1;
  window.EJS_disableDatabases = true;   // não escreve ROM/estado no IndexedDB durante o jogo
  // rewindEnabled: o buffer de rewind do RetroArch CRESCE por quadro — é a
  // causa mais provável do "demora e reseta" (OOM gradual no Safari). Off.
  window.EJS_defaultOptions = { shader: "disabled", rewindEnabled: "disabled" };

  window.EJS_player = "#game";
  window.EJS_core = core;
  window.EJS_gameName = nome;
  window.EJS_gameUrl = url;
  window.EJS_pathtodata = "/emulatorjs/data/";
  window.EJS_backgroundColor = "#0b090d";
  window.EJS_startOnLoaded = true; // sem isso a tela de play some no preto
  const s = document.createElement("script");
  s.src = "/emulatorjs/data/loader.js";
  document.body.appendChild(s);
})();
</script>
</body>
</html>
